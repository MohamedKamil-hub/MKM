<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MKM Systems — VPN and infrastructure for small teams</title>
<meta name="description" content="Self-hosted VPN, Nginx setup, and Linux infrastructure for small businesses. Fixed prices, no subscriptions. Based in Toledo, Spain.">
<meta name="theme-color" content="#0f172a">

<meta property="og:title" content="MKM Systems — VPN and infrastructure for small teams">
<meta property="og:description" content="Self-hosted VPN, Nginx setup, and Linux infrastructure. Fixed prices, no subscriptions.">
<meta property="og:type" content="website">

<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          navy:  { DEFAULT: '#0f172a', soft: '#1e293b', light: '#334155' },
          slate: { 50:'#f8fafc', 100:'#f1f5f9', 200:'#e2e8f0', 300:'#cbd5e1', 400:'#94a3b8', 500:'#64748b', 600:'#475569', 700:'#334155', 800:'#1e293b', 900:'#0f172a' },
          brand: { DEFAULT: '#1e40af', light: '#3b82f6', soft: '#dbeafe' },
          ok: '#059669',
        },
        fontFamily: {
          sans: ['Inter', 'ui-sans-serif', 'system-ui'],
          mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
        },
      },
    },
  };
</script>

<style>
  body { font-feature-settings: 'cv11', 'ss01'; }
  ::selection { background: #1e40af; color: white; }
  :focus { outline: none; }
  :focus-visible { outline: 2px solid #1e40af; outline-offset: 2px; }
  details > summary { list-style: none; }
  details > summary::-webkit-details-marker { display: none; }
</style>
</head>

<body x-data="site()" x-init="init()" :data-lang="lang" class="font-sans antialiased text-slate-900 bg-white">

<!-- TOP BAR -->
<div class="bg-navy text-slate-300 text-xs">
  <div class="max-w-7xl mx-auto px-6 h-9 flex items-center justify-between">
    <div class="flex items-center gap-4">
      <span class="flex items-center gap-1.5">
        <span class="w-1.5 h-1.5 rounded-full bg-ok"></span>
        <span x-text="t('top.status')"></span>
      </span>
      <span class="hidden sm:inline text-slate-500">·</span>
      <span class="hidden sm:inline" x-text="t('top.location')"></span>
    </div>
    <div class="flex items-center gap-4">
      <a :href="'mailto:' + config.email" class="hidden sm:inline hover:text-white transition" x-text="config.email"></a>
      <button @click="toggleLang()" class="hover:text-white transition font-medium" x-text="lang === 'en' ? 'ES' : 'EN'"></button>
    </div>
  </div>
</div>

<!-- NAV -->
<header class="sticky top-0 z-40 bg-white/95 backdrop-blur border-b border-slate-200">
  <nav class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
    <a href="#top" class="flex items-center gap-2.5">
      <div class="w-8 h-8 bg-navy rounded flex items-center justify-center">
        <span class="text-white font-bold text-sm">M</span>
      </div>
      <div class="leading-tight">
        <div class="font-bold text-navy">MKM Systems</div>
        <div class="text-[10px] text-slate-500 font-mono uppercase tracking-wider" x-text="t('nav.subtitle')"></div>
      </div>
    </a>

    <div class="hidden md:flex items-center gap-7 text-sm font-medium text-slate-600">
      <a href="#services" class="hover:text-navy transition" x-text="t('nav.services')"></a>
      <a href="#proof"    class="hover:text-navy transition" x-text="t('nav.proof')"></a>
      <a href="#approach" class="hover:text-navy transition" x-text="t('nav.approach')"></a>
      <a href="#faq"      class="hover:text-navy transition" x-text="t('nav.faq')"></a>
    </div>

    <a :href="config.calendlyUrl" target="_blank" rel="noopener"
       class="inline-flex items-center gap-2 bg-navy text-white px-4 py-2 rounded text-sm font-medium hover:bg-brand transition">
      <span x-text="t('nav.cta')"></span>
      <span class="text-xs">→</span>
    </a>
  </nav>
</header>

<main id="top">

  <!-- HERO -->
  <section class="bg-slate-50 border-b border-slate-200">
    <div class="max-w-7xl mx-auto px-6 py-16 md:py-24 grid md:grid-cols-12 gap-10 items-center">

      <div class="md:col-span-7">
        <div class="inline-flex items-center gap-2 bg-white border border-slate-200 rounded-full px-3 py-1 text-xs font-medium text-slate-600">
          <span class="w-1.5 h-1.5 rounded-full bg-ok"></span>
          <span x-text="t('hero.badge')"></span>
        </div>

        <h1 class="mt-6 text-4xl md:text-5xl lg:text-6xl font-bold tracking-tight text-navy leading-[1.1]" x-text="t('hero.title')"></h1>

        <p class="mt-5 text-lg text-slate-600 leading-relaxed max-w-xl" x-text="t('hero.sub')"></p>

        <div class="mt-7 flex flex-wrap gap-3">
          <a :href="config.calendlyUrl" target="_blank" rel="noopener"
             class="inline-flex items-center gap-2 bg-navy text-white px-6 py-3 rounded font-medium hover:bg-brand transition">
            <span x-text="t('hero.ctaPrimary')"></span>
            <span class="text-xs">→</span>
          </a>
          <a href="#services"
             class="inline-flex items-center gap-2 bg-white border border-slate-300 text-navy px-6 py-3 rounded font-medium hover:border-navy transition">
            <span x-text="t('hero.ctaSecondary')"></span>
          </a>
        </div>

        <div class="mt-8 inline-flex items-start gap-3 bg-white border-l-4 border-ok rounded-r p-4 max-w-xl">
          <span class="text-ok text-xl leading-none mt-0.5">→</span>
          <div>
            <div class="font-bold text-navy text-base" x-text="t('hero.guarantee')"></div>
            <div class="text-sm text-slate-600 mt-0.5" x-text="t('hero.guaranteeSub')"></div>
          </div>
        </div>

        <div class="mt-6 flex flex-wrap items-center gap-x-6 gap-y-3 text-sm text-slate-500">
          <span class="flex items-center gap-1.5"><span class="text-ok">✓</span> <span x-text="t('hero.trust1')"></span></span>
          <span class="flex items-center gap-1.5"><span class="text-ok">✓</span> <span x-text="t('hero.trust2')"></span></span>
          <span class="flex items-center gap-1.5"><span class="text-ok">✓</span> <span x-text="t('hero.trust3')"></span></span>
        </div>
      </div>

      <div class="md:col-span-5">
        <div class="bg-white border border-slate-200 rounded-lg shadow-sm p-6">
          <div class="text-xs font-mono uppercase tracking-wider text-slate-500" x-text="t('hero.statsTitle')"></div>
          <div class="mt-4 space-y-4">
            <div class="flex items-baseline justify-between border-b border-slate-100 pb-3">
              <div>
                <div class="text-2xl font-bold text-navy">40+</div>
                <div class="text-xs text-slate-500" x-text="t('hero.stat1')"></div>
              </div>
              <div class="text-3xl text-slate-200">·</div>
              <div class="text-right">
                <div class="text-2xl font-bold text-navy">99.5%</div>
                <div class="text-xs text-slate-500" x-text="t('hero.stat2')"></div>
              </div>
            </div>
            <div class="flex items-baseline justify-between border-b border-slate-100 pb-3">
              <div>
                <div class="text-2xl font-bold text-navy">512MB</div>
                <div class="text-xs text-slate-500" x-text="t('hero.stat3')"></div>
              </div>
              <div class="text-3xl text-slate-200">·</div>
              <div class="text-right">
                <div class="text-2xl font-bold text-navy">&lt;50ms</div>
                <div class="text-xs text-slate-500" x-text="t('hero.stat4')"></div>
              </div>
            </div>
            <div class="pt-2">
              <div class="text-xs text-slate-500" x-text="t('hero.statsNote')"></div>
              <div class="mt-2 inline-flex items-center gap-2 text-xs font-medium text-navy">
                <span class="bg-slate-100 px-2 py-0.5 rounded" x-text="t('hero.deployedAt')"></span>
                <span class="font-mono">SECCION9</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- SERVICES -->
  <section id="services" class="bg-white">
    <div class="max-w-7xl mx-auto px-6 py-20">

      <div class="max-w-2xl mb-12">
        <div class="text-xs font-mono uppercase tracking-widest text-brand font-medium" x-text="t('services.kicker')"></div>
        <h2 class="mt-2 text-3xl md:text-4xl font-bold text-navy" x-text="t('services.title')"></h2>
        <p class="mt-3 text-slate-600" x-text="t('services.sub')"></p>
      </div>

      <!-- Primary B2B path: scoped engagement -->
      <div class="bg-navy text-white rounded-lg p-7 md:p-10 mb-10">
        <div class="grid md:grid-cols-12 gap-8 items-start">
          <div class="md:col-span-8">
            <div class="text-xs font-mono uppercase tracking-widest text-brand-light font-medium" x-text="t('services.b2bKicker')"></div>
            <h3 class="mt-2 text-2xl md:text-3xl font-bold" x-text="t('services.b2bTitle')"></h3>
            <p class="mt-3 text-slate-300 leading-relaxed" x-text="t('services.b2bDesc')"></p>

            <ul class="mt-5 grid sm:grid-cols-2 gap-x-6 gap-y-2 text-sm text-slate-200">
              <template x-for="f in t('services.b2bFeatures')" :key="f">
                <li class="flex gap-2">
                  <span class="text-ok shrink-0">✓</span>
                  <span x-text="f"></span>
                </li>
              </template>
            </ul>
          </div>

          <div class="md:col-span-4 flex flex-col gap-3">
            <a :href="config.calendlyUrl" target="_blank" rel="noopener"
               class="inline-flex items-center justify-center gap-2 bg-white text-navy px-5 py-3 rounded font-bold hover:bg-brand-soft transition">
              <span x-text="t('services.b2bCta')"></span>
              <span>→</span>
            </a>
            <a href="#contact"
               class="inline-flex items-center justify-center gap-2 border border-slate-500 text-white px-5 py-3 rounded font-medium hover:bg-slate-800 transition">
              <span x-text="t('services.b2bCtaSecondary')"></span>
            </a>
          </div>
        </div>
      </div>

      <!-- Secondary: Upwork productized services -->
      <div class="mb-3">
        <div class="text-xs font-mono uppercase tracking-widest text-slate-500 font-medium" x-text="t('services.upworkKicker')"></div>
        <h3 class="mt-1 text-lg font-bold text-navy" x-text="t('services.upworkTitle')"></h3>
        <p class="mt-1 text-sm text-slate-600" x-text="t('services.upworkSub')"></p>
      </div>

      <div class="grid md:grid-cols-2 gap-6 mb-10">
        <template x-for="s in t('services.fixed')" :key="s.id">
          <article class="border border-slate-200 rounded-lg p-7 hover:border-navy hover:shadow-md transition">
            <div class="flex items-center justify-between mb-3">
              <span class="inline-flex items-center text-xs font-medium bg-slate-100 text-slate-700 px-2.5 py-1 rounded" x-text="s.tag"></span>
              <span class="text-xs font-mono text-slate-500" x-text="s.timeframe"></span>
            </div>

            <h3 class="text-xl font-bold text-navy" x-text="s.name"></h3>
            <p class="mt-2 text-sm text-slate-600 leading-relaxed" x-text="s.desc"></p>

            <ul class="mt-5 space-y-2 text-sm text-slate-700">
              <template x-for="f in s.features" :key="f">
                <li class="flex gap-2">
                  <span class="text-ok shrink-0">✓</span>
                  <span x-text="f"></span>
                </li>
              </template>
            </ul>

            <div class="mt-6 pt-5 border-t border-slate-100 flex items-center justify-between">
              <div>
                <div class="flex items-baseline gap-1">
                  <span class="text-2xl font-bold text-navy" x-text="s.price"></span>
                  <span class="text-sm text-slate-500" x-text="s.priceNote"></span>
                </div>
              </div>
              <a :href="s.href" target="_blank" rel="noopener"
                 class="inline-flex items-center gap-2 bg-navy text-white px-4 py-2 rounded text-sm font-medium hover:bg-brand transition">
                <span x-text="s.cta"></span>
                <span class="text-xs">→</span>
              </a>
            </div>
          </article>
        </template>
      </div>

    </div>
  </section>

  <!-- PROOF -->
  <section id="proof" class="bg-slate-50 border-y border-slate-200">
    <div class="max-w-7xl mx-auto px-6 py-20">

      <div class="grid md:grid-cols-12 gap-10">
        <div class="md:col-span-5">
          <div class="text-xs font-mono uppercase tracking-widest text-brand font-medium" x-text="t('proof.kicker')"></div>
          <h2 class="mt-2 text-3xl md:text-4xl font-bold text-navy" x-text="t('proof.title')"></h2>
          <p class="mt-3 text-slate-600" x-text="t('proof.sub')"></p>

          <div class="mt-8 bg-white border border-slate-200 rounded-lg p-6">
            <div class="flex items-center gap-4 mb-4">
              <div class="w-14 h-14 bg-navy text-white rounded-full flex items-center justify-center font-bold text-lg">KM</div>
              <div>
                <div class="font-bold text-navy" x-text="config.brandName"></div>
                <div class="text-sm text-slate-500" x-text="t('proof.role')"></div>
              </div>
            </div>
            <div class="space-y-2 text-sm text-slate-600">
              <div class="flex gap-2"><span class="text-slate-400 shrink-0 w-20" x-text="t('proof.basedIn')"></span><span class="text-slate-800 font-medium">Toledo, Spain</span></div>
              <div class="flex gap-2"><span class="text-slate-400 shrink-0 w-20" x-text="t('proof.recently')"></span><span class="text-slate-800 font-medium">SECCION9 Consultoría</span></div>
              <div class="flex gap-2"><span class="text-slate-400 shrink-0 w-20" x-text="t('proof.lang')"></span><span class="text-slate-800 font-medium">ES, EN</span></div>
              <div class="flex gap-2"><span class="text-slate-400 shrink-0 w-20" x-text="t('proof.respond')"></span><span class="text-slate-800 font-medium" x-text="t('proof.respondVal')"></span></div>
            </div>
            <div class="mt-5 pt-5 border-t border-slate-100 flex flex-wrap gap-2">
              <a :href="config.linkedin" target="_blank" rel="noopener" class="text-xs font-medium bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded transition">LinkedIn →</a>
              <a :href="config.github" target="_blank" rel="noopener" class="text-xs font-medium bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded transition">GitHub →</a>
              <a :href="config.upwork" target="_blank" rel="noopener" class="text-xs font-medium bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded transition">Upwork →</a>
            </div>
          </div>
        </div>

        <div class="md:col-span-7">
          <div class="bg-white border border-slate-200 rounded-lg p-7">
            <div class="text-xs font-mono uppercase tracking-widest text-slate-500 mb-4" x-text="t('proof.casestudyKicker')"></div>
            <h3 class="text-xl font-bold text-navy" x-text="t('proof.casestudyTitle')"></h3>

            <div class="mt-6 grid grid-cols-3 gap-4 text-center">
              <div class="bg-slate-50 rounded p-4">
                <div class="text-2xl font-bold text-navy">40</div>
                <div class="text-xs text-slate-500 mt-1" x-text="t('proof.metric1')"></div>
              </div>
              <div class="bg-slate-50 rounded p-4">
                <div class="text-2xl font-bold text-navy">99.5%</div>
                <div class="text-xs text-slate-500 mt-1" x-text="t('proof.metric2')"></div>
              </div>
              <div class="bg-slate-50 rounded p-4">
                <div class="text-2xl font-bold text-navy">€1</div>
                <div class="text-xs text-slate-500 mt-1" x-text="t('proof.metric3')"></div>
              </div>
            </div>

            <p class="mt-6 text-sm text-slate-600 leading-relaxed" x-text="t('proof.casestudyBody')"></p>

            <div class="mt-5 flex flex-wrap gap-2">
              <template x-for="tag in ['WireGuard','OpenVPN','FastAPI','Nginx','Bash','PowerShell','iptables','Fail2ban','systemd']" :key="tag">
                <span class="text-xs font-mono bg-slate-100 text-slate-700 px-2 py-1 rounded" x-text="tag"></span>
              </template>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- APPROACH -->
  <section id="approach" class="bg-white">
    <div class="max-w-7xl mx-auto px-6 py-20">

      <div class="max-w-2xl mb-12">
        <div class="text-xs font-mono uppercase tracking-widest text-brand font-medium" x-text="t('approach.kicker')"></div>
        <h2 class="mt-2 text-3xl md:text-4xl font-bold text-navy" x-text="t('approach.title')"></h2>
        <p class="mt-3 text-slate-600" x-text="t('approach.sub')"></p>
      </div>

      <div class="grid md:grid-cols-3 gap-px bg-slate-200 border border-slate-200 rounded-lg overflow-hidden">
        <template x-for="(p, i) in t('approach.principles')" :key="p.t">
          <div class="bg-white p-6">
            <div class="flex items-start gap-3 mb-3">
              <div class="w-8 h-8 bg-slate-100 rounded flex items-center justify-center font-mono text-xs text-slate-600 font-bold" x-text="String(i+1).padStart(2,'0')"></div>
            </div>
            <h3 class="font-bold text-navy" x-text="p.t"></h3>
            <p class="mt-2 text-sm text-slate-600 leading-relaxed" x-text="p.d"></p>
          </div>
        </template>
      </div>
    </div>
  </section>

  <!-- AUDIT CTA -->
  <section class="bg-navy text-white">
    <div class="max-w-7xl mx-auto px-6 py-16 md:py-20 grid md:grid-cols-12 gap-8 items-center">
      <div class="md:col-span-8">
        <div class="text-xs font-mono uppercase tracking-widest text-brand-light font-medium" x-text="t('audit.kicker')"></div>
        <h2 class="mt-2 text-3xl md:text-4xl font-bold leading-tight" x-text="t('audit.title')"></h2>
        <p class="mt-4 text-slate-300 leading-relaxed max-w-2xl" x-text="t('audit.sub')"></p>

        <ul class="mt-6 grid sm:grid-cols-2 gap-x-6 gap-y-2 max-w-xl text-sm text-slate-300">
          <template x-for="b in t('audit.bullets')" :key="b">
            <li class="flex gap-2">
              <span class="text-brand-light">→</span>
              <span x-text="b"></span>
            </li>
          </template>
        </ul>
      </div>

      <div class="md:col-span-4 md:text-right">
        <a :href="config.calendlyUrl" target="_blank" rel="noopener"
           class="inline-flex items-center gap-2 bg-white text-navy px-6 py-3.5 rounded font-bold hover:bg-brand-soft transition">
          <span x-text="t('audit.cta')"></span>
          <span>→</span>
        </a>
        <div class="mt-4 text-xs text-slate-400" x-text="t('audit.note')"></div>
      </div>
    </div>
  </section>

  <!-- FAQ -->
  <section id="faq" class="bg-white">
    <div class="max-w-4xl mx-auto px-6 py-20">

      <div class="mb-10">
        <div class="text-xs font-mono uppercase tracking-widest text-brand font-medium" x-text="t('faq.kicker')"></div>
        <h2 class="mt-2 text-3xl md:text-4xl font-bold text-navy" x-text="t('faq.title')"></h2>
      </div>

      <div class="border-t border-slate-200">
        <template x-for="(qa, i) in t('faq.items')" :key="qa.q">
          <details class="group border-b border-slate-200" x-data="{ open: false }" :open="open">
            <summary @click.prevent="open = !open" class="flex cursor-pointer items-start justify-between gap-6 py-5 hover:bg-slate-50 transition px-2 -mx-2 rounded">
              <span class="font-bold text-navy" x-text="qa.q"></span>
              <span class="text-2xl text-slate-400 shrink-0 leading-none transition-transform" :class="open ? 'rotate-45' : ''">+</span>
            </summary>
            <div class="pb-5 px-2 text-slate-600 leading-relaxed" x-text="qa.a"></div>
          </details>
        </template>
      </div>
    </div>
  </section>

  <!-- CONTACT -->
  <section id="contact" class="bg-slate-50 border-t border-slate-200">
    <div class="max-w-7xl mx-auto px-6 py-20 grid md:grid-cols-12 gap-10">

      <div class="md:col-span-5">
        <div class="text-xs font-mono uppercase tracking-widest text-brand font-medium" x-text="t('contact.kicker')"></div>
        <h2 class="mt-2 text-3xl md:text-4xl font-bold text-navy" x-text="t('contact.title')"></h2>
        <p class="mt-3 text-slate-600" x-text="t('contact.sub')"></p>

        <div class="mt-8 space-y-3">
          <a :href="'mailto:' + config.email" class="block bg-white border border-slate-200 rounded p-4 hover:border-navy transition">
            <div class="text-xs font-mono uppercase tracking-wider text-slate-500" x-text="t('contact.emailLabel')"></div>
            <div class="font-medium text-navy mt-0.5" x-text="config.email"></div>
          </a>
          <a :href="config.calendlyUrl" target="_blank" rel="noopener" class="block bg-white border border-slate-200 rounded p-4 hover:border-navy transition">
            <div class="text-xs font-mono uppercase tracking-wider text-slate-500" x-text="t('contact.calendlyLabel')"></div>
            <div class="font-medium text-navy mt-0.5" x-text="t('contact.calendlyVal')"></div>
          </a>
          <a :href="config.linkedin" target="_blank" rel="noopener" class="block bg-white border border-slate-200 rounded p-4 hover:border-navy transition">
            <div class="text-xs font-mono uppercase tracking-wider text-slate-500">LinkedIn</div>
            <div class="font-medium text-navy mt-0.5">/in/elkouarti</div>
          </a>
        </div>
